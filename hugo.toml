baseURL = "https://ifonin.ru/"
languageCode = "ru"
defaultContentLanguage = "ru"
title = "ifonin.ru"

[taxonomies]
  tag = "tags"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[params]
  description = "Экспертный блог о вайб-кодинге, AI-инструментах и пет-проектах"
  author = "Игорь Фонин"
  ogImage = "/images/og-default.png"
  umamiUrl = "https://analytics.ifonin.ru"
  umamiWebsiteId = "b19dd729-d4b6-4bcb-9d04-0b589cb52c15"

[sitemap]
  changefreq = "weekly"
  priority = 0.5

# Markdown for Agents: каждая страница дополнительно отдаётся как index.md
# (см. layouts/_default/{single,list}.md). nginx отдаёт .md по Accept: text/markdown.
[mediaTypes]
  [mediaTypes."text/markdown"]
    suffixes = ["md"]

[outputFormats]
  [outputFormats.markdown]
    mediaType = "text/markdown"
    baseName = "index"
    isPlainText = true
    # .Permalink в .md-шаблоне должен указывать на каноническую HTML-страницу
    permalinkable = false

[outputs]
  home = ["HTML", "RSS", "markdown"]
  section = ["HTML", "RSS", "markdown"]
  page = ["HTML", "markdown"]

[permalinks]
  blog = "/blog/:slug/"

[related]
  includeNewer = true
  threshold = 50
  toLower = true
  [[related.indices]]
    name = "tags"
    weight = 100
  [[related.indices]]
    name = "date"
    weight = 10
