<title>{{ if .IsHome }}{{ .Site.Title }} — {{ .Site.Params.description }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
{{ $desc := .Description | default .Summary | default .Site.Params.description }}
<meta name="description" content="{{ $desc | plainify | truncate 160 }}">
<link rel="canonical" href="{{ .Permalink }}">
{{ if or (eq .Kind "taxonomy") (eq .Kind "term") }}<meta name="robots" content="noindex, follow">{{ else }}<meta name="robots" content="index, follow">{{ end }}
