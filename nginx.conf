# Markdown for Agents: клиент, явно запросивший Markdown через
# `Accept: text/markdown`, получает .md-версию страницы; браузерам —
# HTML по умолчанию. $md_suffix подставляется в try_files ниже.
map $http_accept $md_suffix {
    default           "";
    "~*text/markdown" "index.md";
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # .md отдаём как text/markdown; charset=utf-8. Само сопоставление
    # расширения .md → text/markdown добавляется в mime.types (см. Dockerfile).
    # charset_types ограничен markdown, чтобы не менять заголовки HTML/CSS.
    charset utf-8;
    charset_types text/markdown;

    error_page 404 /404.html;

    location / {
        # При Accept: text/markdown сначала пробуем <путь>/index.md,
        # иначе $md_suffix пустой и отдаётся обычный HTML.
        try_files ${uri}${md_suffix} $uri $uri/ =404;
        add_header Vary Accept always;
    }
}
